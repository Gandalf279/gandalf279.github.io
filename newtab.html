    <style>
        body {
            color: orangered;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .boxes-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 10em;
            height: 10em;
            border: 5px solid #ff4500;
            border-radius: 10%;
            margin: 0 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box svg {
            width: calc(100% - 20px);
            height: calc(100% - 20px);
        }

        svg {
            filter: invert(57%) sepia(90%) saturate(6677%) hue-rotate(4deg) brightness(104%) contrast(104%);
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .search-bar {
            width: 40em;
            padding: 12px 16px;
            border: 3px solid #ff4500;
            border-radius: 8px;
            background-color: transparent;
            color: orangered;
            font-size: 16px;
            outline: none;
        }

        .search-bar::placeholder {
            color: rgba(255, 69, 0, 0.6);
        }

        .search-bar:focus {
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.5);
        }
    </style>
</head>
